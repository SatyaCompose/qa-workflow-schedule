name: Hourly Asana Sync

on:
  schedule:
    # Every 15 minutes during the IST working window (06:00-22:00).
    # GitHub Actions cron uses UTC. IST = UTC+5:30, so in UTC the window is
    # 00:30..16:30. Three cron entries give precise 15-min ticks inside that
    # range without leaking into off-hours.
    # Total runs/day: 2 + 60 + 3 = 65.
    - cron: "30,45 0 * * *"          # UTC 00:30, 00:45 → IST 06:00, 06:15
    - cron: "*/15 1-15 * * *"        # UTC 01:00..15:45 → IST 06:30..21:15
    - cron: "0,15,30 16 * * *"       # UTC 16:00, 16:15, 16:30 → IST 21:30..22:00
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/sync on Vercel
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "::error::DEPLOY_URL secret is not set"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set"
            exit 1
          fi

          response_file=$(mktemp)
          status=$(curl -sS -o "$response_file" -w "%{http_code}" \
            --max-time 90 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${DEPLOY_URL%/}/api/cron/sync")

          echo "HTTP $status"
          echo "Response body:"
          cat "$response_file"
          echo

          if [ "$status" != "200" ]; then
            echo "::error::Sync endpoint returned HTTP $status"
            exit 1
          fi
